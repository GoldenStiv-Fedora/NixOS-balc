name: "Auto Update NixOS Packages"

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
        with:
          use-github-cache: false

      - name: DEBUG - Список всех файлов
        run: |
          echo "Проверяем содержимое репозитория:"
          find . -maxdepth 3 -not -path '*/.*'

      - name: Обновление пакетов
        run: |
          # Автоматический поиск flake.nix
          FLAKE_FILE=$(find . -name "flake.nix" | head -n 1)
          
          if [ -z "$FLAKE_FILE" ]; then
            echo "ОШИБКА: файл flake.nix не найден в репозитории!"
            exit 1
          fi
          
          FLAKE_DIR=$(dirname "$FLAKE_FILE")
          echo "Файл flake.nix найден в директории: $FLAKE_DIR"
          
          # Создаем заглушку для железа, чтобы Nix не ругался на импорты
          echo "{ ... }: { }" > "$FLAKE_DIR/hardware-configuration.nix"
          echo "{ ... }: { }" > "$FLAKE_DIR/users.nix"
          echo "{ ... }: { }" > "$FLAKE_DIR/rutoken.nix"
          
          # Запуск обновления
          nix flake update "$FLAKE_DIR" --extra-experimental-features "nix-command flakes"
          
          # Удаляем заглушки перед коммитом
          rm "$FLAKE_DIR/hardware-configuration.nix"
          rm "$FLAKE_DIR/users.nix"
          rm "$FLAKE_DIR/rutoken.nix"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем все найденные flake.lock файлы
          find . -name "flake.lock" -exec git add {} +
          
          git commit -m "system: auto-update flake.lock" || echo "No changes to commit"
          git push
