name: "Auto Update NixOS Packages"

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
        with:
          # Игнорируем проблемы с кэшем GitHub
          use-github-cache: false
          # Пропускаем проверку кэша при сбоях GitHub
          magic-nix-cache-config: ""

      - name: Update flake.lock
        run: |
          echo "=== ТЕКУЩАЯ ДИРЕКТОРИЯ ==="
          pwd
          echo "=== ПОИСК ФАЙЛОВ ==="
          find . -maxdepth 2 -not -path '*/.*'

          # Определяем папку с флейком
          if [ -f "configs/flake.nix" ]; then
            TARGET_DIR="configs"
          elif [ -f "flake.nix" ]; then
            TARGET_DIR="."
          else
            echo "ОШИБКА: flake.nix не найден!"
            exit 1
          fi

          echo "Использую папку: $TARGET_DIR"

          # Создаем заглушку железа ТАМ ЖЕ, где лежит flake.nix
          # Это нужно, чтобы Nix не ругался на отсутствие импортов
          echo "{ ... }: { }" > "$TARGET_DIR/hardware-configuration.nix"
          echo "Временный файл создан: $TARGET_DIR/hardware-configuration.nix"

          # Запуск обновления. Мы указываем путь к папке явно.
          nix flake update "./$TARGET_DIR" --extra-experimental-features "nix-command flakes" --show-trace

          # Удаляем заглушку перед отправкой в Git
          rm "$TARGET_DIR/hardware-configuration.nix"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем именно тот lock-файл, который был обновлен
          if [ -f "configs/flake.lock" ]; then
            git add configs/flake.lock
          elif [ -f "flake.lock" ]; then
            git add flake.lock
          fi
          
          git commit -m "system: auto-update flake.lock (3-day cycle)" || echo "No changes to commit"
          git push
