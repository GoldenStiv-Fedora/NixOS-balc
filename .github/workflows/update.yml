name: "Auto Update NixOS Packages"

on:
  schedule:
    # Запуск в 03:00 ночи (UTC) каждые 3 дня
    - cron: '0 3 */3 * *'
  workflow_dispatch: # Кнопка для запуска вручную из интерфейса GitHub

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем роботу право записывать изменения в ваш репозиторий
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Update flake.lock
        run: |
          echo "Проверка структуры файлов..."
          ls -R
          
          # Определяем путь к flake
          if [ -f "configs/flake.nix" ]; then
            FLAKE_PATH="./configs"
            echo "Найдено: configs/flake.nix"
          elif [ -f "flake.nix" ]; then
            FLAKE_PATH="."
            echo "Найдено: flake.nix в корне"
          else
            echo "ОШИБКА: Файл flake.nix не найден! Проверьте структуру на GitHub."
            exit 1
          fi
          
          # Запуск обновления именно для найденного пути
          nix flake update $FLAKE_PATH --extra-experimental-features "nix-command flakes"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем именно тот lock-файл, который мог измениться
          if [ -f "configs/flake.lock" ]; then
            git add configs/flake.lock
          elif [ -f "flake.lock" ]; then
            git add flake.lock
          fi
          
          git commit -m "system: auto-update flake.lock (3-day cycle)" || echo "No changes to commit"
          git push
