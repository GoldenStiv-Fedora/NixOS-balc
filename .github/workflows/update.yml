name: "Auto Update NixOS Packages"

on:
  schedule:
    # Запуск в 03:00 ночи (UTC) каждые 3 дня
    - cron: '0 3 */3 * *'
  workflow_dispatch: # Кнопка для запуска обновления вручную из интерфейса GitHub

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Даем роботу право записывать изменения в ваш репозиторий
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Update flake.lock
        run: |
          cd configs
          nix flake update --extra-experimental-features "nix-command flakes"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/flake.lock
          git commit -m "system: auto-update configs/flake.lock (3-day cycle)" || echo "No changes to commit"
          git push
