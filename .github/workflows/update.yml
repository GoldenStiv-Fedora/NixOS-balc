name: "Auto Update NixOS Packages"

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12

      - name: Update flake.lock
        run: |
          echo "=== ПРОВЕРКА СТРУКТУРЫ ==="
          ls -R
          
          if [ -d "configs" ] && [ -f "configs/flake.nix" ]; then
            echo "Найдено: configs/flake.nix. Захожу в папку..."
            cd configs
            nix flake update --extra-experimental-features "nix-command flakes"
          elif [ -f "flake.nix" ]; then
            echo "Найдено: flake.nix в корне."
            nix flake update --extra-experimental-features "nix-command flakes"
          else
            echo "ОШИБКА: Файл flake.nix не найден ни в корне, ни в configs/!"
            ls -la
            exit 1
          fi

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/flake.lock || git add flake.lock
          git commit -m "system: auto-update flake.lock (3-day cycle)" || echo "No changes to commit"
          git push
