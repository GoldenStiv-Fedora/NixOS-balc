name: "Автоматическое обновление пакетов NixOS"

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  update-flake:
    name: "Обновление flake.lock"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Клонирование репозитория"
        uses: actions/checkout@v4

      - name: "Установка Nix"
        uses: DeterminateSystems/nix-installer-action@v12

      - name: "Обновление зависимостей (flake update)"
        run: |
          # Поиск директории с flake.nix
          FLAKE_FILE=$(find . -name "flake.nix" | head -n 1)
          if [ -z "$FLAKE_FILE" ]; then
            echo "Ошибка: файл flake.nix не найден"
            exit 1
          fi
          FLAKE_DIR=$(dirname "$FLAKE_FILE")
          echo "Файл flake.nix найден в директории: $FLAKE_DIR"

          # Создание временных заглушек для импортов
          touch "$FLAKE_DIR/hardware-configuration.nix"
          echo "{ ... }: { }" > "$FLAKE_DIR/hardware-configuration.nix"
          touch "$FLAKE_DIR/users.nix"
          echo "{ ... }: { }" > "$FLAKE_DIR/users.nix"
          touch "$FLAKE_DIR/rutoken.nix"
          echo "{ ... }: { }" > "$FLAKE_DIR/rutoken.nix"

          # Обновление flake.lock
          nix flake update "$FLAKE_DIR" --extra-experimental-features "nix-command flakes"

          # Удаление заглушек
          rm "$FLAKE_DIR/hardware-configuration.nix" "$FLAKE_DIR/users.nix" "$FLAKE_DIR/rutoken.nix"

      - name: "Сохранение изменений в GitHub"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Поиск и добавление обновленного flake.lock
          find . -name "flake.lock" -exec git add {} +
          
          git commit -m "система: автоматическое обновление flake.lock" || echo "Нет изменений для коммита"
          git push
