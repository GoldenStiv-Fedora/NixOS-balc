name: "Auto Update NixOS Packages"

on:
  schedule:
    - cron: '0 3 */3 * *'
  workflow_dispatch:

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v12
        with:
          # Отключаем кэш, так как он сейчас не работает на стороне GitHub
          use-github-cache: false

      - name: Update flake.lock
        run: |
          echo "=== ПРОВЕРКА СТРУКТУРЫ ==="
          find . -maxdepth 2 -not -path '*/.*'
          
          if [ -f "configs/flake.nix" ]; then
            TARGET_DIR="configs"
          elif [ -f "flake.nix" ]; then
            TARGET_DIR="."
          else
            echo "ОШИБКА: flake.nix не найден!"
            exit 1
          fi

          echo "Работаем в директории: $TARGET_DIR"
          
          # Создаем заглушку железа, чтобы Nix не падал при чтении configuration.nix
          # Также создаем заглушки для других файлов, если их вдруг нет
          touch "$TARGET_DIR/hardware-configuration.nix"
          echo "{ ... }: { }" > "$TARGET_DIR/hardware-configuration.nix"
          
          # Запуск обновления с выводом полной ошибки
          nix flake update "./$TARGET_DIR" --extra-experimental-features "nix-command flakes" --show-trace
          
          # Удаляем временный файл
          rm "$TARGET_DIR/hardware-configuration.nix"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "configs/flake.lock" ]; then
            git add configs/flake.lock
          elif [ -f "flake.lock" ]; then
            git add flake.lock
          fi
          
          git commit -m "system: auto-update flake.lock (3-day cycle)" || echo "No changes to commit"
          git push
