name: "Автоматическое обновление пакетов NixOS"

# Настройка расписания (Cron)
on:
  schedule:
    # '0 3 */3 * *' означает: запуск в 03:00 каждые 3 дня.
    # Чтобы изменить частоту, редактируйте строку ниже:
    - cron: '0 3 */3 * *'
  workflow_dispatch: # Позволяет запускать вручную кнопкой

env:
  # Переменные для удобной настройки
  COMMIT_MSG: "система: автоматическое обновление flake.lock"
  GIT_USER_NAME: "github-actions[bot]"
  GIT_USER_EMAIL: "github-actions[bot]@users.noreply.github.com"
  # Список файлов-заглушек (через пробел)
  STUB_FILES: "hardware-configuration.nix users.nix rutoken.nix"

jobs:
  update-flake:
    name: "Обновление flake.lock"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: "Клонирование репозитория"
        uses: actions/checkout@v4

      - name: "Установка Nix"
        uses: DeterminateSystems/nix-installer-action@v12

      - name: "Обновление зависимостей (flake update)"
        run: |
          # 1. Поиск директории с конфигурацией
          FLAKE_FILE=$(find . -name "flake.nix" | head -n 1)
          if [ -z "$FLAKE_FILE" ]; then
            echo "Ошибка: файл flake.nix не найден"
            exit 1
          fi
          FLAKE_DIR=$(dirname "$FLAKE_FILE")
          echo "Файл найден в: $FLAKE_DIR"
          
          cd "$FLAKE_DIR"

          # 2. Создание временных заглушек из переменной STUB_FILES
          for file in ${{ env.STUB_FILES }}; do
            if [ ! -f "$file" ]; then
              echo "{ ... }: { }" > "$file"
              echo "Создана заглушка: $file"
            fi
          done

          # 3. Обновление пакетов
          nix flake update --extra-experimental-features "nix-command flakes"

          # 4. Удаление временных заглушек
          for file in ${{ env.STUB_FILES }}; do
            # Удаляем файл только если он не в списке git (на всякий случай)
            rm -f "$file"
          done

      - name: "Сохранение изменений в GitHub"
        run: |
          git config user.name "${{ env.GIT_USER_NAME }}"
          git config user.email "${{ env.GIT_USER_EMAIL }}"
          
          # Находим и добавляем именно тот файл, который обновился
          find . -name "flake.lock" -exec git add {} +
          
          git commit -m "${{ env.COMMIT_MSG }}" || echo "Нет изменений для коммита"
          git push
